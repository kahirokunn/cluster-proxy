{{- if eq .Values.installMode "Hosted" }}
{{- $clusterProxyImage := include "cluster-proxy-common.clusterProxyImage" . }}
{{- $sourceNamespace := default .Values.clusterName .Values.externalManagedKubeConfigSecretNamespace }}
{{- $enableAgentMetricsService := or (eq (toString .Values.agentMetricsServiceEnabled) "true") (eq (toString .Values.agentServiceMonitorEnabled) "true") -}}
{{- $enableAgentServiceMonitor := eq (toString .Values.agentServiceMonitorEnabled) "true" -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  namespace: {{ $sourceNamespace }}
  name: cluster-proxy-managed-kubeconfig-source-reader
  annotations:
    addon.open-cluster-management.io/hosted-manifest-location: hosting
rules:
  - apiGroups:
      - ""
    resources:
      - secrets
    resourceNames:
      - {{ .Values.externalManagedKubeConfigSecretName }}
    verbs:
      - get
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  namespace: {{ $sourceNamespace }}
  name: cluster-proxy-managed-kubeconfig-source-reader
  annotations:
    addon.open-cluster-management.io/hosted-manifest-location: hosting
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: cluster-proxy-managed-kubeconfig-source-reader
subjects:
  - kind: ServiceAccount
    name: cluster-proxy
    namespace: {{ .Release.Namespace }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  namespace: {{ .Release.Namespace }}
  name: cluster-proxy-managed-kubeconfig-writer
  annotations:
    addon.open-cluster-management.io/hosted-manifest-location: hosting
rules:
  - apiGroups:
      - ""
    resources:
      - secrets
    resourceNames:
      - {{ .Values.managedKubeConfigSecret }}
    verbs:
      - get
      - update
      - patch
      - delete
  - apiGroups:
      - ""
    resources:
      - secrets
    verbs:
      - create
  - apiGroups:
      - ""
    resources:
      - events
    verbs:
      - create
      - patch
      - update
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  namespace: {{ .Release.Namespace }}
  name: cluster-proxy-managed-kubeconfig-writer
  annotations:
    addon.open-cluster-management.io/hosted-manifest-location: hosting
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: cluster-proxy-managed-kubeconfig-writer
subjects:
  - kind: ServiceAccount
    name: cluster-proxy
    namespace: {{ .Release.Namespace }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: {{ .Release.Namespace }}
  name: cluster-proxy-managed-kubeconfig-provisioner
  annotations:
    addon.open-cluster-management.io/hosted-manifest-location: hosting
spec:
  replicas: 1
  selector:
    matchLabels:
      open-cluster-management.io/addon: cluster-proxy
      proxy.open-cluster-management.io/component-name: managed-kubeconfig-provisioner
  template:
    metadata:
      labels:
        open-cluster-management.io/addon: cluster-proxy
        proxy.open-cluster-management.io/component-name: managed-kubeconfig-provisioner
    spec:
      serviceAccountName: cluster-proxy
      {{- if .Values.tolerations }}
      tolerations: {{ toYaml .Values.tolerations | nindent 8 }}
      {{- end }}
      {{- if .Values.nodeSelector }}
      nodeSelector: {{ toYaml .Values.nodeSelector | nindent 8 }}
      {{- end }}
      containers:
        - name: managed-kubeconfig-provisioner
          image: {{ $clusterProxyImage }}
          imagePullPolicy: IfNotPresent
          command:
            - /cluster-proxy
          args:
            - managed-kubeconfig-provisioner
            - --cluster-name={{ .Values.clusterName }}
            - --source-namespace={{ $sourceNamespace }}
            - --source-name={{ .Values.externalManagedKubeConfigSecretName }}
            - --target-namespace={{ .Release.Namespace }}
            - --target-name={{ .Values.managedKubeConfigSecret }}
            - --managed-service-account-namespace={{ .Release.Namespace }}
            - --managed-service-account-name=cluster-proxy
            - --token-expiration={{ .Values.managedKubeConfigTokenExpiration }}
            - --refresh-before={{ .Values.managedKubeConfigRefreshBefore }}
            - --sync-interval={{ .Values.managedKubeConfigSyncInterval }}
            - --hub-kubeconfig=/etc/kubeconfig/kubeconfig
            - --addon-name=cluster-proxy
            - --addon-namespace={{ .Values.clusterName }}
            - --health-probe-bind-address=:8000
          ports:
            - name: metrics
              containerPort: 8000
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            privileged: false
            runAsNonRoot: true
            readOnlyRootFilesystem: true
          env:
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          volumeMounts:
            - name: hub-kubeconfig
              mountPath: /etc/kubeconfig/
              readOnly: true
      volumes:
        - name: hub-kubeconfig
          secret:
            secretName: cluster-proxy-hub-kubeconfig
      imagePullSecrets:
      {{- range .Values.proxyAgentImagePullSecrets }}
        - name: {{ . }}
      {{- end }}
{{- if $enableAgentMetricsService }}
---
apiVersion: v1
kind: Service
metadata:
  namespace: {{ .Release.Namespace }}
  name: cluster-proxy-managed-kubeconfig-provisioner-metrics
  labels:
    open-cluster-management.io/addon: cluster-proxy
    proxy.open-cluster-management.io/component-name: managed-kubeconfig-provisioner
  annotations:
    addon.open-cluster-management.io/hosted-manifest-location: hosting
spec:
  type: ClusterIP
  selector:
    open-cluster-management.io/addon: cluster-proxy
    proxy.open-cluster-management.io/component-name: managed-kubeconfig-provisioner
  ports:
    - name: metrics
      port: 8000
      targetPort: 8000
{{- if $enableAgentServiceMonitor }}
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  namespace: {{ .Release.Namespace }}
  name: cluster-proxy-managed-kubeconfig-provisioner-metrics
{{- with .Values.agentServiceMonitorLabels }}
  labels:
{{- toYaml . | nindent 4 }}
{{- end }}
  annotations:
    addon.open-cluster-management.io/hosted-manifest-location: hosting
spec:
  selector:
    matchLabels:
      open-cluster-management.io/addon: cluster-proxy
      proxy.open-cluster-management.io/component-name: managed-kubeconfig-provisioner
  endpoints:
    - path: /metrics
      scheme: http
      port: metrics
{{- end }}
{{- end }}
---
apiVersion: batch/v1
kind: Job
metadata:
  namespace: {{ .Release.Namespace }}
  name: cluster-proxy-managed-kubeconfig-cleanup
  annotations:
    addon.open-cluster-management.io/hosted-manifest-location: hosting
    addon.open-cluster-management.io/addon-pre-delete: ""
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        open-cluster-management.io/addon: cluster-proxy
        proxy.open-cluster-management.io/component-name: managed-kubeconfig-cleanup
    spec:
      serviceAccountName: cluster-proxy
      restartPolicy: OnFailure
      containers:
        - name: cleanup
          image: {{ $clusterProxyImage }}
          imagePullPolicy: IfNotPresent
          command:
            - /cluster-proxy
          args:
            - managed-kubeconfig-provisioner
            - --cleanup
            - --target-namespace={{ .Release.Namespace }}
            - --target-name={{ .Values.managedKubeConfigSecret }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            privileged: false
            runAsNonRoot: true
            readOnlyRootFilesystem: true
      imagePullSecrets:
      {{- range .Values.proxyAgentImagePullSecrets }}
        - name: {{ . }}
      {{- end }}
{{- end }}
