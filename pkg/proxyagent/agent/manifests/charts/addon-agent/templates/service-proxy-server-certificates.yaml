{{- $enableServiceProxy := .Values.enableServiceProxy -}}
{{- if $enableServiceProxy }}
apiVersion: v1
kind: Secret
metadata:
  namespace: {{ .Release.Namespace }}
  name: cluster-proxy-service-proxy-server-certificates
{{ if eq .Values.installMode "Hosted" }}
  annotations:
    addon.open-cluster-management.io/hosted-manifest-location: hosting
{{ end }}
data:
  "tls.crt": {{ .Values.serviceProxySecretCert }}
  "tls.key": {{ .Values.serviceProxySecretKey }}
{{- end }}
