apiVersion: addon.open-cluster-management.io/v1alpha1
kind: ClusterManagementAddOn
metadata:
  name: cluster-proxy
  annotations:
    "addon.open-cluster-management.io/lifecycle": "addon-manager"
spec:
  addOnMeta:
    displayName: cluster-proxy
    description: cluster-proxy
  supportedConfigs:
  - group: proxy.open-cluster-management.io
    resource: managedproxyconfigurations
    defaultConfig:
      name: cluster-proxy
  - group: addon.open-cluster-management.io
    resource: addondeploymentconfigs
  installStrategy:
{{- if .Values.installByPlacement.enabled }}
    type: Placements
    placements:
      - name: {{ .Values.installByPlacement.placementName | default "cluster-proxy-placement"  }}
        namespace: {{ .Values.installByPlacement.placementNamespace | default .Release.Namespace }}
{{- else }}
    type: Manual
{{- end }}
